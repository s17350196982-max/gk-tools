<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公考工具箱</title>
<link rel="stylesheet" href="assets/css/portal.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" role="navigation">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">公</div>
      <span class="sidebar-brand-text">公考工具箱</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页
      </button>
      <button class="nav-item" data-view="exam">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>省考助手
      </button>
      <button class="nav-item" data-view="essay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>申论方格纸
      </button>
      <button class="nav-item" data-view="speed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>资料速算
      </button>
      <button class="nav-item" data-view="curve">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/><line x1="12" y1="18" x2="16" y2="18"/></svg>遗忘曲线
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="theme-toggle">
        <span class="theme-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        <span class="theme-label">深色模式</span>
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-area">
    <header class="header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="菜单"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="page-title" id="page-title">首页</span>
      </div>
      <div class="header-actions"></div>
    </header>
    <div class="content-area">
      <div class="dashboard-view" id="dashboard-view">
        <div class="dashboard-greeting">
          <h2><span id="greeting-text">早上好</span> 👋</h2>
          <span class="greeting-date" id="greeting-date"></span>
        </div>
        <div class="tool-cards">
          <div class="tool-card" data-view="exam">
            <div class="tool-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg></div>
            <div class="tool-card-title">公考助手</div>
            <div class="tool-card-desc">模拟考场环境，计时提醒，自定义科目与评分，适用于各类考试</div>
            <div class="tool-card-hint">点击进入 →</div>
          </div>
          <div class="tool-card" data-view="essay">
            <div class="tool-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg></div>
            <div class="tool-card-title">申论方格纸</div>
            <div class="tool-card-desc">方格纸写作，字数统计，计时器，模板插入，排版编辑</div>
            <div class="tool-card-hint">点击进入 →</div>
          </div>
          <div class="tool-card" data-view="speed">
            <div class="tool-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
            <div class="tool-card-title">资料速算</div>
            <div class="tool-card-desc">乘法百化分速算训练，练习与复习双模式，错题自动重做</div>
            <div class="tool-card-hint">点击进入 →</div>
          </div>
          <div class="tool-card" data-view="curve">
            <div class="tool-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/><line x1="12" y1="18" x2="16" y2="18"/></svg></div>
            <div class="tool-card-title">遗忘曲线</div>
            <div class="tool-card-desc">艾宾浩斯复习计划，学习项目记录，自动排期，导入导出</div>
            <div class="tool-card-hint">点击进入 →</div>
          </div>
        </div>
      </div>
      <div class="tool-container" id="tool-container">
        <iframe class="tool-frame" id="tool-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals" loading="lazy"></iframe>
      </div>
    </div>
  </div>
</div>
<script src="assets/js/portal.js"></script>
</body>
</html>
